<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="VIP 貴賓廳訂房管理系統 — 同步、高效、即時">
  <title>BookingHub — VIP 訂房管理系統</title>
  <!-- CSS will be injected here by build.js -->
  <!-- {{CSS}} -->
</head>
<body>

<!-- ============================================================
     Login Overlay
     ============================================================ -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.2L19.5 8 12 11.8 4.5 8 12 4.2zM4 9.5l7 3.5v7.8l-7-3.5V9.5zm9 11.3V13l7-3.5v7.8l-7 3.5z"/></svg>
    </div>
    <h1>BookingHub</h1>
    <div class="login-subtitle">VIP 貴賓廳訂房管理系統</div>
    <div class="login-input-group">
      <span class="login-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0v3z"/></svg>
      </span>
      <input type="password" id="login-password" placeholder="請輸入密碼" onkeydown="handleLogin(event)">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="handleLogin({key:'Enter'})">登 入</button>
    <div class="login-hint">預設密碼：admin123（首次登入後請修改）</div>
  </div>
</div>

<!-- ============================================================
     App Shell
     ============================================================ -->
<div id="app-shell">

  <!-- ===== Sidebar ===== -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.2L19.5 8 12 11.8 4.5 8 12 4.2zM4 9.5l7 3.5v7.8l-7-3.5V9.5zm9 11.3V13l7-3.5v7.8l-7 3.5z"/></svg>
      </div>
      <div class="sidebar-title"><span>BookingHub</span></div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">主功能</div>
      <div class="nav-item active" data-page="overview" onclick="navigateTo('overview')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>
        <span class="nav-label">總覽</span>
        <span class="nav-shortcut">1</span>
      </div>
      <div class="nav-item" data-page="calendar" onclick="navigateTo('calendar')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg></div>
        <span class="nav-label">日曆</span>
        <span class="nav-shortcut">2</span>
      </div>
      <div class="nav-item" data-page="booking-list" onclick="navigateTo('booking-list')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h10v2H4v-2z"/></svg></div>
        <span class="nav-label">訂房列表</span>
        <span class="nav-shortcut">3</span>
      </div>
      <div class="nav-item" data-page="stats" onclick="navigateTo('stats')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg></div>
        <span class="nav-label">統計</span>
        <span class="nav-shortcut">4</span>
      </div>
      <div class="nav-item" data-page="bot-log" onclick="navigateTo('bot-log')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.72v1.32l4 2v2l-4 2v2.24A4 4 0 0 1 12 22a4 4 0 0 1-1-7.76V4a2 2 0 0 1 1-2z"/></svg></div>
        <span class="nav-label">Bot日誌</span>
        <span class="nav-shortcut">5</span>
      </div>

      <div class="sidebar-section-label" style="margin-top:var(--sp-4);">工具</div>
      <div class="nav-item" onclick="openAgentModal()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
        <span class="nav-label">代理管理</span>
      </div>
      <div class="nav-item" onclick="openBackupModal()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/></svg></div>
        <span class="nav-label">備份還原</span>
      </div>
      <div class="nav-item" onclick="manualSync()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1 .25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></div>
        <span class="nav-label">手動同步</span>
      </div>
      <div class="nav-item" onclick="clearAllData()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>
        <span class="nav-label">清除全部</span>
      </div>
      <div class="nav-item" onclick="handleLogout()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></div>
        <span class="nav-label">登出</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sync-status-pill">
        <div class="sync-dot disconnected" id="sync-dot"></div>
        <span id="sync-status-text">未連線</span>
        <span style="margin-left:auto;" id="last-sync-time">—</span>
      </div>
      <div class="version-label">v1.0.0</div>
    </div>
  </aside>

  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- ===== Main Content ===== -->
  <div id="main-content">

    <!-- ===== Topbar ===== -->
    <div id="topbar">
      <button id="sidebar-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="topbar-title">
        <h2 id="topbar-page-title">總覽</h2>
        <div class="topbar-subtitle" id="topbar-subtitle">VIP 貴賓廳訂房管理</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <div class="month-nav">
          <button onclick="prevMonth()" title="上月">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <span class="month-display" id="month-display">—</span>
          <button onclick="nextMonth()" title="下月">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </button>
        </div>
        <button class="icon-btn" onclick="openBookingModal()" title="新增訂房 (Ctrl+N)">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="icon-btn" onclick="manualSync()" title="同步 (Ctrl+S)">
          <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1 .25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>
      </div>
    </div>

    <!-- ===== Pages ===== -->
    <div class="page-content active" id="page-overview"></div>
    <div class="page-content" id="page-calendar"></div>
    <div class="page-content" id="page-booking-list"></div>
    <div class="page-content" id="page-stats"></div>
    <div class="page-content" id="page-bot-log"></div>

  </div>
</div>

<!-- ===== Bottom Navigation (Mobile) ===== -->
<nav id="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bottom-nav-item active" data-page="overview" onclick="navigateTo('overview')">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span class="bottom-nav-label">總覽</span>
    </div>
    <div class="bottom-nav-item" data-page="calendar" onclick="navigateTo('calendar')">
      <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/></svg>
      <span class="bottom-nav-label">日曆</span>
    </div>
    <div class="bottom-nav-item" data-page="booking-list" onclick="navigateTo('booking-list')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h10v2H4v-2z"/></svg>
      <span class="bottom-nav-label">列表</span>
    </div>
    <div class="bottom-nav-item" data-page="stats" onclick="navigateTo('stats')">
      <svg viewBox="0 0 24 24"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg>
      <span class="bottom-nav-label">統計</span>
    </div>
    <div class="bottom-nav-item" data-page="bot-log" onclick="navigateTo('bot-log')">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.72v1.32l4 2v2l-4 2v2.24A4 4 0 0 1 12 22a4 4 0 0 1-1-7.76V4a2 2 0 0 1 1-2z"/></svg>
      <span class="bottom-nav-label">Bot</span>
    </div>
  </div>
</nav>

<!-- ===== Toast Container ===== -->
<div id="toast-container"></div>

<!-- JS will be injected here by build.js -->
<!-- {{JS}} -->

</body>
</html>
